name: HemoLink CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Backend
        working-directory: BloodBankManagement
        run: mvn clean install -DskipTests

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Build Frontend
        run: npm install
          npm run build

      - name: Run Tests
        run: echo "Run tests here"

      # 🔐 Run ONLY for develop & main
      - name: Security Scan (Trivy)
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."

      # 🚀 Deploy ONLY on main
      - name: Deploy
        if: github.ref == 'refs/heads/main'
        run: echo "Deploying to production..."
